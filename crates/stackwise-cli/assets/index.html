<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackwise</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #edf1f5;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-strong: #ffffff;
        --ink: #141820;
        --muted: #667085;
        --soft: #f4f6f8;
        --line: #d7dee8;
        --line-strong: #c3ccd9;
        --accent: #0f766e;
        --blue: #2563eb;
        --green: #059669;
        --amber: #d97706;
        --red: #dc2626;
        --violet: #6d5bd0;
        --left-width: 320px;
        --right-width: 520px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      * { box-sizing: border-box; }
      body { margin: 0; }

      .app {
        display: grid;
        grid-template-columns: minmax(240px, var(--left-width)) 6px minmax(360px, 1fr) 6px minmax(360px, var(--right-width));
        grid-template-rows: 72px minmax(0, 1fr) 36px;
        gap: 10px;
        height: 100vh;
        padding: 10px;
        background:
          linear-gradient(180deg, #f8fafc 0%, #eef2f6 48%, #e8edf2 100%);
      }

      header,
      footer,
      aside,
      main,
      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 46px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(16px);
      }

      header,
      footer {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
      }

      header {
        gap: 14px;
        padding: 10px 12px;
      }

      footer {
        gap: 10px;
        padding: 0 12px;
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      aside,
      main,
      section {
        min-height: 0;
        overflow: hidden;
      }

      aside { grid-column: 1; }
      main { grid-column: 3; }
      section { grid-column: 5; }

      aside,
      section {
        display: flex;
        flex-direction: column;
        padding: 14px;
      }

      main {
        position: relative;
        background: #f7f9fb;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        color: #172033;
        font-size: 17px;
        font-weight: 600;
        line-height: 1;
        letter-spacing: 0.015em;
      }

      h2 {
        color: #344054;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      input,
      select,
      button {
        height: 36px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: var(--panel-strong);
        color: var(--ink);
        font: inherit;
        font-size: 13px;
      }

      input,
      select {
        outline: 0;
      }

      input:focus,
      select:focus,
      button:focus-visible,
      .treeRow:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 0 11px;
        cursor: pointer;
      }

      button:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
      }

      button:disabled {
        color: #98a2b3;
        cursor: not-allowed;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 172px;
      }

      .mark {
        width: 36px;
        height: 36px;
        flex: 0 0 auto;
        filter: drop-shadow(0 8px 14px rgba(15, 23, 42, 0.12));
      }

      .markTilePrimary { fill: #0f766e; }
      .markTileDark { fill: #111c28; }
      .markTileSoft { fill: #9adccc; }
      .markTileAccent { fill: #17b69f; }
      .markTilePale { fill: #c9ebe3; }

      .markTile {
        stroke: rgba(255, 255, 255, 0.72);
        stroke-width: 1.2;
      }

      .summaryChips,
      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .summaryChips {
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        height: 28px;
        max-width: 190px;
        border: 1px solid #dce3ec;
        border-radius: 8px;
        padding: 0 9px;
        background: rgba(255, 255, 255, 0.72);
        color: #344054;
        font-size: 12px;
        white-space: nowrap;
      }

      .infoDot {
        display: inline-grid;
        width: 16px;
        height: 16px;
        place-items: center;
        border-radius: 50%;
        background: #eef2f7;
        color: #667085;
        font-size: 11px;
        font-weight: 700;
      }

      .chip strong {
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--ink);
        font-variant-numeric: tabular-nums;
      }

      .appChip {
        border-color: rgba(15, 118, 110, 0.28);
        background: #eef8f6;
        color: #0f766e;
      }

      .searchBox {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 280px;
        height: 36px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        padding: 0 10px;
        background: var(--panel-strong);
      }

      .searchBox input {
        width: 100%;
        min-width: 0;
        height: 32px;
        border: 0;
        padding: 0;
        background: transparent;
      }

      .panelHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }

      .panelActions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
      }

      .panelActions button {
        height: 30px;
        padding: 0 9px;
        font-size: 12px;
      }

      .moduleTree {
        display: flex;
        flex: 1;
        min-height: 0;
        flex-direction: column;
        gap: 5px;
        overflow: auto;
        padding: 1px 2px 8px 0;
      }

      .treeRow {
        position: relative;
        overflow: hidden;
        min-height: 38px;
        width: 100%;
        border: 1px solid rgba(215, 222, 232, 0.88);
        border-radius: 8px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        color: inherit;
        cursor: pointer;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.68);
        transition: border-color 0.12s ease, background 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
      }

      .treeRow::before {
        content: "";
        position: absolute;
        inset: 7px auto 7px 0;
        width: 3px;
        border-radius: 0 999px 999px 0;
        background: transparent;
        transition: background 0.12s ease;
      }

      .treeLine {
        position: relative;
        display: flex;
        min-height: 38px;
        min-width: 0;
        align-items: center;
        gap: 8px;
        padding: 6px 8px 6px calc(9px + var(--indent, 0px));
      }

      .treeToggle {
        display: grid;
        width: 24px;
        height: 24px;
        flex: 0 0 auto;
        place-items: center;
        border: 1px solid transparent;
        border-radius: 7px;
        background: rgba(238, 242, 247, 0.76);
        padding: 0;
        color: #667085;
        transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
      }

      .treeToggle:hover:not(:disabled) {
        border-color: rgba(15, 118, 110, 0.18);
        background: #e6f5f2;
        color: #0f766e;
      }

      .chevronIcon {
        width: 7px;
        height: 7px;
        border-right: 1.8px solid currentColor;
        border-bottom: 1.8px solid currentColor;
        transform: rotate(-45deg);
        transform-origin: 55% 55%;
        transition: transform 0.16s ease;
      }

      .treeToggle.expanded .chevronIcon {
        transform: rotate(45deg);
      }

      .treeToggle.placeholder {
        visibility: hidden;
        pointer-events: none;
      }

      .treeRow input[type="checkbox"] {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
        accent-color: var(--accent);
      }

      .treeRow:hover,
      .treeRow.active {
        border-color: rgba(15, 118, 110, 0.45);
        background: linear-gradient(180deg, #ffffff 0%, #f5fbfa 100%);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.92), 0 8px 18px rgba(15, 23, 42, 0.05);
      }

      .treeRow:hover {
        transform: translateY(-1px);
      }

      .treeRow.active::before {
        background: var(--accent);
      }

      .treeRow.mixed {
        border-color: rgba(217, 119, 6, 0.36);
        background: linear-gradient(180deg, #ffffff 0%, #fffaf0 100%);
      }

      .treeRow.mixed::before {
        background: var(--amber);
      }

      .treeRow strong,
      .detailName {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .treeText {
        display: flex;
        flex: 1;
        min-width: 0;
        align-items: center;
        gap: 8px;
      }

      .treeText strong {
        min-width: 0;
      }

      .swatch {
        width: 10px;
        height: 10px;
        flex: 0 0 auto;
        border-radius: 3px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.46);
      }

      .treeMeta,
      .muted {
        color: var(--muted);
      }

      .treeMeta {
        flex: 0 0 auto;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .metric {
        font-variant-numeric: tabular-nums;
      }

      .detail {
        display: flex;
        flex: 1;
        min-height: 0;
        flex-direction: column;
        gap: 12px;
        overflow: auto;
      }

      .detailCard {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .codePanel {
        display: flex;
        min-height: 260px;
        flex-direction: column;
        gap: 10px;
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }

      .codeHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .sourceLink {
        border: 0;
        padding: 0;
        background: transparent;
        min-width: 0;
        overflow: hidden;
        color: #0f766e;
        cursor: zoom-in;
        font-family: inherit;
        font-size: 12px;
        text-align: right;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .sourceLink:hover,
      .sourceLink:focus-visible {
        color: #115e59;
        text-decoration: underline;
      }

      .codeGrid {
        display: grid;
        min-height: 0;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .codeBlock {
        min-height: 120px;
        max-height: 320px;
        overflow: auto;
        border: 1px solid #dfe6ee;
        border-radius: 8px;
        background: #10151f;
        color: #d7dde8;
        font-family: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
        font-size: 12px;
        line-height: 1.55;
      }

      .codeBlock[data-popout] {
        cursor: zoom-in;
      }

      .codeBlock[data-popout]:hover {
        border-color: rgba(20, 184, 166, 0.55);
      }

      .codeTitle {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: 7px 9px;
        color: #9fb0c9;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .codeLine {
        display: grid;
        grid-template-columns: 46px minmax(0, 1fr);
        gap: 10px;
        padding: 0 10px;
        white-space: pre;
      }

      .asmLine {
        grid-template-columns: 92px 120px minmax(0, 1fr);
      }

      .codeLine.highlight {
        background: rgba(20, 184, 166, 0.16);
      }

      .lineNo,
      .address,
      .bytes {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #74839a;
        user-select: none;
      }

      .tok-key,
      .asm-op {
        color: #73daca;
      }

      .tok-type,
      .asm-reg {
        color: #8ab4ff;
      }

      .tok-macro,
      .asm-num {
        color: #e9c46a;
      }

      .tok-comment {
        color: #6f7f96;
      }

      .contextMessage {
        border: 1px solid #e7edf4;
        border-radius: 8px;
        padding: 9px;
        background: #f8fafc;
        color: var(--muted);
        font-size: 12px;
      }

      .detailName {
        font-size: 14px;
        line-height: 1.35;
      }

      code {
        overflow-wrap: anywhere;
        border: 1px solid #e1e7ef;
        border-radius: 8px;
        background: #f6f8fb;
        padding: 9px;
        color: #475467;
        font-size: 12px;
        line-height: 1.45;
      }

      dl {
        display: grid;
        grid-template-columns: 118px 1fr;
        gap: 9px;
        margin: 0;
        font-size: 13px;
      }

      dt {
        color: var(--muted);
      }

      dd {
        margin: 0;
        overflow-wrap: anywhere;
        font-variant-numeric: tabular-nums;
      }

      .pillRow {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .pill {
        border-radius: 8px;
        padding: 4px 7px;
        background: #eef6f5;
        color: #0f766e;
        font-size: 12px;
      }

      .empty {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: var(--muted);
        font-size: 14px;
      }

      .tooltip {
        position: absolute;
        z-index: 4;
        max-width: 360px;
        pointer-events: none;
        border: 1px solid rgba(20, 24, 32, 0.12);
        border-radius: 8px;
        padding: 9px 10px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.16);
        color: var(--ink);
        font-size: 12px;
        transform: translate(12px, 12px);
      }

      .tooltip strong {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-bottom: 4px;
      }

      .resizer {
        position: relative;
        grid-row: 2;
        min-height: 0;
        cursor: col-resize;
        touch-action: none;
      }

      .leftResizer { grid-column: 2; }
      .rightResizer { grid-column: 4; }

      .resizer::before {
        content: "";
        position: absolute;
        inset: 8px 2px;
        border-radius: 999px;
        background: rgba(102, 112, 133, 0.22);
        transition: background 0.12s ease, transform 0.12s ease;
      }

      .resizer:hover::before,
      .resizer.dragging::before {
        background: rgba(15, 118, 110, 0.55);
        transform: scaleX(1.45);
      }

      body.resizing,
      body.resizing * {
        cursor: col-resize !important;
        user-select: none;
      }

      .codeModal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .codeModal.hidden {
        display: none;
      }

      .codeModalBackdrop {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.52);
        backdrop-filter: blur(6px);
      }

      .codeModalPanel {
        position: relative;
        display: grid;
        width: min(1180px, 96vw);
        height: min(820px, 90vh);
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.32);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 26px 80px rgba(15, 23, 42, 0.32);
      }

      .codeModal.fullscreen {
        padding: 0;
      }

      .codeModal.fullscreen .codeModalPanel {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }

      .codeModalHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding: 12px 14px;
      }

      .codeModalTitle {
        min-width: 0;
      }

      .codeModalTitle strong,
      .codeModalTitle span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .codeModalTitle span {
        margin-top: 3px;
        color: var(--muted);
        font-size: 12px;
      }

      .codeModalActions {
        display: flex;
        flex: 0 0 auto;
        gap: 8px;
      }

      .codeModalBody {
        min-height: 0;
        overflow: auto;
        background: #10151f;
      }

      .codeModalBody .codeBlock {
        min-height: 100%;
        max-height: none;
        border: 0;
        border-radius: 0;
      }

      .codeModalBody .codeLine {
        grid-template-columns: 64px minmax(0, 1fr);
      }

      .codeModalBody .asmLine {
        grid-template-columns: 118px 150px minmax(0, 1fr);
      }

      .hidden { display: none; }

      @media (max-width: 1080px) {
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: auto 190px minmax(340px, 1fr) 300px 36px;
        }

        header,
        footer {
          grid-column: 1;
        }

        aside,
        main,
        section {
          grid-column: 1;
        }

        .resizer {
          display: none;
        }

        header {
          flex-wrap: wrap;
        }

        .brand {
          min-width: 145px;
        }

        .summaryChips {
          order: 3;
          flex-basis: 100%;
        }

        .controls {
          flex: 1;
          justify-content: flex-end;
        }

        .searchBox {
          width: min(100%, 320px);
        }
      }

      @media (max-width: 680px) {
        .app {
          padding: 6px;
          gap: 6px;
          grid-template-rows: auto 170px minmax(320px, 1fr) 300px 36px;
        }

        .controls {
          flex-wrap: wrap;
          justify-content: flex-start;
        }

        .searchBox,
        select {
          width: 100%;
        }

        .summaryChips {
          flex-wrap: wrap;
        }

        .codeModal {
          padding: 8px;
        }

        .codeModalHeader {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">
          <svg class="mark" aria-hidden="true" viewBox="0 0 36 36" role="img">
            <defs>
              <linearGradient id="markPrimary" x1="4" y1="4" x2="23" y2="23" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#12b89f" />
                <stop offset="1" stop-color="#0f766e" />
              </linearGradient>
            </defs>
            <rect class="markTile markTilePrimary" fill="url(#markPrimary)" x="3" y="3" width="19" height="17" rx="4" />
            <rect class="markTile markTileDark" x="24" y="3" width="9" height="17" rx="3.5" />
            <rect class="markTile markTileSoft" x="3" y="23" width="10" height="10" rx="3" />
            <rect class="markTile markTileAccent" x="15" y="23" width="7" height="10" rx="2.5" />
            <rect class="markTile markTilePale" x="24" y="23" width="9" height="10" rx="3" />
          </svg>
          <h1>Stackwise</h1>
        </div>
        <div id="summaryChips" class="summaryChips"></div>
        <div class="controls">
          <label class="searchBox" aria-label="Search symbols">
            <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <input id="search" placeholder="Symbol, crate, module" />
          </label>
          <select id="metric" aria-label="Metric">
            <option value="own">Own frame</option>
            <option value="worst">Worst path</option>
            <option value="code">Code size</option>
            <option value="risk">Unresolved risk</option>
          </select>
          <select id="confidence" aria-label="Confidence">
            <option value="all">All confidence</option>
            <option value="known">Known frames</option>
            <option value="unknown">Unknown only</option>
          </select>
        </div>
      </header>

      <aside>
        <div class="panelHeader">
          <h2>Modules</h2>
          <div class="panelActions">
            <button id="selectAllModules" type="button">Select all</button>
            <button id="deselectAllModules" type="button">Deselect all</button>
          </div>
        </div>
        <div id="groups" class="moduleTree"></div>
      </aside>

      <div id="leftResizer" class="resizer leftResizer" role="separator" aria-label="Resize modules panel"></div>

      <main>
        <canvas id="treemap"></canvas>
        <div id="empty" class="empty">Loading report...</div>
        <div id="tooltip" class="tooltip hidden"></div>
      </main>

      <div id="rightResizer" class="resizer rightResizer" role="separator" aria-label="Resize symbols panel"></div>

      <section>
        <div class="panelHeader">
          <h2>Symbol</h2>
        </div>
        <div id="details" class="detail muted">Select a rectangle.</div>
      </section>

      <footer id="status">Loading...</footer>
    </div>

    <div id="codeModal" class="codeModal hidden" aria-hidden="true">
      <div class="codeModalBackdrop" data-close-code-modal></div>
      <div class="codeModalPanel" role="dialog" aria-modal="true" aria-labelledby="codeModalTitle">
        <div class="codeModalHeader">
          <div class="codeModalTitle">
            <strong id="codeModalTitle">Code view</strong>
            <span id="codeModalSubtitle"></span>
          </div>
          <div class="codeModalActions">
            <button id="codeModalFullscreen" type="button">Full screen</button>
            <button id="codeModalClose" type="button">Close</button>
          </div>
        </div>
        <div id="codeModalBody" class="codeModalBody"></div>
      </div>
    </div>

    <script>
      const state = {
        report: null,
        filtered: [],
        rects: [],
        groupRects: [],
        selected: null,
        hovered: null,
        moduleTree: null,
        expandedModules: new Set(),
        includedModules: null,
        context: null,
        contextLoading: false,
        contextSymbolId: null,
        fullSourceCache: new Map(),
        codeModalKind: null,
        codeModalSymbolId: null,
      };
      const app = document.querySelector(".app");
      const canvas = document.getElementById("treemap");
      const ctx = canvas.getContext("2d");
      const search = document.getElementById("search");
      const metric = document.getElementById("metric");
      const confidence = document.getElementById("confidence");
      const empty = document.getElementById("empty");
      const details = document.getElementById("details");
      const status = document.getElementById("status");
      const groups = document.getElementById("groups");
      const selectAllModules = document.getElementById("selectAllModules");
      const deselectAllModules = document.getElementById("deselectAllModules");
      const summaryChips = document.getElementById("summaryChips");
      const tooltip = document.getElementById("tooltip");
      const leftResizer = document.getElementById("leftResizer");
      const rightResizer = document.getElementById("rightResizer");
      const codeModal = document.getElementById("codeModal");
      const codeModalTitle = document.getElementById("codeModalTitle");
      const codeModalSubtitle = document.getElementById("codeModalSubtitle");
      const codeModalBody = document.getElementById("codeModalBody");
      const codeModalClose = document.getElementById("codeModalClose");
      const codeModalFullscreen = document.getElementById("codeModalFullscreen");

      fetch("/report.json").then(r => r.json()).then(report => {
        state.report = report;
        state.moduleTree = buildModuleTree(report);
        state.includedModules = defaultIncludedModules(report, state.moduleTree);
        renderAll();
      }).catch(error => {
        empty.textContent = `Failed to load report: ${error}`;
        status.textContent = "Failed";
      });

      search.addEventListener("input", renderAll);
      metric.addEventListener("change", renderAll);
      confidence.addEventListener("change", renderAll);
      selectAllModules.addEventListener("click", () => {
        state.includedModules = null;
        renderAll();
      });
      deselectAllModules.addEventListener("click", () => {
        state.includedModules = new Set();
        renderAll();
      });
      window.addEventListener("resize", draw);
      initResizer(leftResizer, "left");
      initResizer(rightResizer, "right");
      codeModalClose.addEventListener("click", closeCodeModal);
      codeModal.querySelector("[data-close-code-modal]").addEventListener("click", closeCodeModal);
      codeModalFullscreen.addEventListener("click", () => {
        codeModal.classList.toggle("fullscreen");
        codeModalFullscreen.textContent = codeModal.classList.contains("fullscreen") ? "Windowed" : "Full screen";
      });
      document.addEventListener("keydown", event => {
        if (event.key === "Escape" && !codeModal.classList.contains("hidden")) closeCodeModal();
      });

      canvas.addEventListener("click", event => {
        const rect = pickRect(event);
        state.selected = rect?.symbol ?? null;
        loadSymbolContext();
        renderDetails();
        draw();
      });

      canvas.addEventListener("mousemove", event => {
        const rect = pickRect(event);
        state.hovered = rect?.symbol ?? null;
        if (rect) {
          tooltip.classList.remove("hidden");
          tooltip.style.left = `${event.offsetX}px`;
          tooltip.style.top = `${event.offsetY}px`;
          tooltip.innerHTML = `
            <strong>${escapeHtml(rect.symbol.demangled)}</strong>
            <span>${escapeHtml(metricLabel(metric.value))}: ${formatBytes(metricValue(rect.symbol))}</span>
          `;
        } else {
          tooltip.classList.add("hidden");
        }
        draw();
      });

      canvas.addEventListener("mouseleave", () => {
        state.hovered = null;
        tooltip.classList.add("hidden");
        draw();
      });

      function renderAll() {
        if (!state.report) return;
        const q = search.value.trim().toLowerCase();
        const confidenceMode = confidence.value;
        const groupIds = includedSymbolIds();
        state.filtered = state.report.symbols
          .filter(symbol => {
            const haystack = `${symbol.demangled} ${symbol.name} ${symbol.crate_name ?? ""} ${symbol.module_path?.join("::") ?? ""}`.toLowerCase();
            const matches = !q || haystack.includes(q);
            const known = symbol.own_frame.bytes != null;
            const confidenceOk = confidenceMode === "all" || (confidenceMode === "known" && known) || (confidenceMode === "unknown" && !known);
            const groupOk = !groupIds || groupIds.has(symbol.id);
            return matches && confidenceOk && groupOk;
          })
          .sort((left, right) => symbolRank(left) - symbolRank(right) || metricValue(right) - metricValue(left));
        renderSummary();
        renderModuleTree();
        renderDetails();
        draw();
        empty.textContent = state.filtered.length ? "" : "No symbols match the current filters.";
        empty.style.display = state.filtered.length ? "none" : "grid";
        status.textContent = `${state.report.artifact.file_name} | ${state.report.summary.symbol_count} symbols | ${state.report.summary.known_frame_count} known frames | ${state.report.summary.unknown_frame_count} unknown | ${state.report.summary.confidence} confidence`;
      }

      function renderSummary() {
        const summary = state.report.summary;
        const primary = primaryCrateName(state.report);
        const chips = [
          ...(primary ? [["App", primary, "The crate/package Stackwise believes this analysis was run for. It is prioritized in the treemap and module list."]] : []),
          ["Symbols", summary.symbol_count, "Functions/symbols Stackwise found in the final artifact."],
          ["Known", summary.known_frame_count, "Symbols where Stackwise found stack frame evidence. Known does not always mean exact; check confidence and evidence."],
          ["Unknown", summary.unknown_frame_count, "Symbols with no usable stack frame evidence. They are never counted as zero."],
          ["Edges", summary.edge_count, "Resolved call graph edges recovered from direct calls and tail calls in machine code."],
          ["Filtered", state.filtered.length, "Symbols currently visible after search, confidence, and module filters."],
        ];
        summaryChips.innerHTML = chips.map(([label, value, help]) => {
          const className = label === "App" ? "chip appChip" : "chip";
          const display = typeof value === "number" ? formatNumber(value) : escapeHtml(value);
          return `<span class="${className}" title="${escapeHtml(help)}">${label}<strong>${display}</strong><span class="infoDot">?</span></span>`;
        }).join("");
      }

      function renderModuleTree() {
        groups.innerHTML = "";
        const activeSymbolIds = includedSymbolIds();
        const visible = visibleModuleNodes(state.moduleTree);

        for (const node of visible) {
          const selection = moduleSelectionState(node, activeSymbolIds);
          const el = document.createElement("div");
          const hasChildren = node.children.length > 0;
          const expanded = state.expandedModules.has(node.key);
          el.className = `treeRow${selection === "checked" ? " active" : ""}${selection === "mixed" ? " mixed" : ""}`;
          el.innerHTML = `
            <div class="treeLine" style="--indent:${node.depth * 16}px">
              <button class="treeToggle${hasChildren ? "" : " placeholder"}${expanded ? " expanded" : ""}" type="button" aria-label="${expanded ? "Collapse" : "Expand"} ${escapeHtml(node.path)}" data-module-toggle="${escapeHtml(node.key)}" aria-expanded="${hasChildren ? String(expanded) : "false"}"><span class="chevronIcon" aria-hidden="true"></span></button>
              <input type="checkbox" ${selection === "checked" ? "checked" : ""} data-module-key="${escapeHtml(node.key)}" />
              <span class="treeText" title="${escapeHtml(node.path)}">
                <span class="swatch" style="background:${node.color}"></span>
                <strong>${escapeHtml(node.name)}</strong>
              </span>
              <span class="treeMeta">${formatNumber(node.symbolIds.size)} symbols</span>
            </div>`;
          const checkbox = el.querySelector("input");
          checkbox.indeterminate = selection === "mixed";
          el.addEventListener("click", () => {
            toggleModule(node.key);
            renderAll();
          });
          checkbox.addEventListener("click", event => {
            event.stopPropagation();
            toggleModule(node.key);
            renderAll();
          });
          const toggle = el.querySelector(".treeToggle");
          if (hasChildren) {
            toggle.addEventListener("click", event => {
              event.stopPropagation();
              if (state.expandedModules.has(node.key)) {
                state.expandedModules.delete(node.key);
              } else {
                state.expandedModules.add(node.key);
              }
              renderModuleTree();
            });
          }
          groups.appendChild(el);
        }
      }

      function buildModuleTree(report) {
        const root = createModuleNode("root", "", -1);
        const byKey = new Map();
        for (const group of report.groups) {
          const parts = modulePartsForGroup(group, report);
          let current = root;
          for (const part of parts) {
            const path = current.path ? `${current.path}::${part}` : part;
            if (!current.childMap.has(part)) {
              const node = createModuleNode(part, path, current.depth + 1);
              current.childMap.set(part, node);
              byKey.set(node.key, node);
            }
            current = current.childMap.get(part);
          }
          current.groupIds.push(group.id);
          for (const symbolId of group.symbol_ids) current.directSymbolIds.add(symbolId);
        }

        const allKeys = [];
        finalizeModuleNode(root, report, allKeys);
        root.byKey = byKey;
        root.allKeys = allKeys;
        return root;
      }

      function defaultIncludedModules(report, tree) {
        const primary = primaryCrateName(report);
        if (!primary) return null;
        const node = tree.byKey.get(primary);
        if (!node) return null;
        return new Set(moduleKeys(node));
      }

      function createModuleNode(name, path, depth) {
        return {
          key: path || "__root__",
          name,
          path,
          depth,
          childMap: new Map(),
          children: [],
          groupIds: [],
          directSymbolIds: new Set(),
          symbolIds: new Set(),
          ownFrameSum: null,
          worstPathMax: null,
          priority: 4,
          color: "#94a3b8",
        };
      }

      function modulePartsForGroup(group, report) {
        const groupParts = String(group.name || "").split("::").map(part => part.trim()).filter(Boolean);
        if (groupParts.length) return groupParts;
        const firstSymbol = report.symbols[group.symbol_ids[0]];
        if (firstSymbol?.module_path?.length) return firstSymbol.module_path.filter(Boolean);
        const crate = firstSymbol ? symbolCrate(firstSymbol) : null;
        return [crate || "unknown"];
      }

      function finalizeModuleNode(node, report, allKeys) {
        node.children = [...node.childMap.values()];
        node.symbolIds = new Set(node.directSymbolIds);
        for (const child of node.children) {
          finalizeModuleNode(child, report, allKeys);
          for (const symbolId of child.symbolIds) node.symbolIds.add(symbolId);
        }

        let own = 0;
        let hasOwn = false;
        let worst = null;
        let firstSymbol = null;
        let priority = 4;
        for (const symbolId of node.symbolIds) {
          const symbol = report.symbols[symbolId];
          if (!symbol) continue;
          firstSymbol ??= symbol;
          priority = Math.min(priority, groupPriority(symbol, report));
          if (symbol.own_frame.bytes != null) {
            own += symbol.own_frame.bytes;
            hasOwn = true;
          }
          if (symbol.worst_path.bytes != null) {
            worst = Math.max(worst ?? 0, symbol.worst_path.bytes);
          }
        }
        node.ownFrameSum = hasOwn ? own : null;
        node.worstPathMax = worst;
        node.priority = priority;
        node.color = firstSymbol ? groupColor(firstSymbol, report) : "#94a3b8";
        node.children.sort((left, right) => {
          const leftValue = left.ownFrameSum ?? left.worstPathMax ?? 0;
          const rightValue = right.ownFrameSum ?? right.worstPathMax ?? 0;
          return left.priority - right.priority || rightValue - leftValue || left.name.localeCompare(right.name);
        });
        if (node.key !== "__root__") allKeys.push(node.key);
      }

      function visibleModuleNodes(root) {
        const out = [];
        const visit = node => {
          out.push(node);
          if (!state.expandedModules.has(node.key)) return;
          for (const child of node.children) visit(child);
        };
        for (const child of root.children) visit(child);
        return out;
      }

      function moduleSelectionState(node, activeSymbolIds) {
        if (!activeSymbolIds) return "checked";
        if (!node.symbolIds.size) return "unchecked";
        let selected = 0;
        for (const symbolId of node.symbolIds) {
          if (activeSymbolIds.has(symbolId)) selected += 1;
        }
        if (selected === 0) return "unchecked";
        return selected === node.symbolIds.size ? "checked" : "mixed";
      }

      function toggleModule(moduleKey) {
        const tree = state.moduleTree;
        const node = tree.byKey.get(moduleKey);
        if (!node) return;
        const activeSymbolIds = includedSymbolIds();
        const wasChecked = moduleSelectionState(node, activeSymbolIds) === "checked";
        const included = state.includedModules ? new Set(state.includedModules) : new Set(tree.allKeys);
        for (const key of moduleKeys(node)) {
          if (wasChecked) {
            included.delete(key);
          } else {
            included.add(key);
          }
        }
        state.includedModules = included.size === tree.allKeys.length ? null : included;
      }

      function moduleKeys(node) {
        const keys = [node.key];
        for (const child of node.children) keys.push(...moduleKeys(child));
        return keys;
      }

      function includedSymbolIds() {
        if (!state.includedModules) return null;
        const symbolIds = new Set();
        for (const key of state.includedModules) {
          const node = state.moduleTree.byKey.get(key);
          if (!node) continue;
          for (const symbolId of node.symbolIds) symbolIds.add(symbolId);
        }
        return symbolIds;
      }

      function initResizer(handle, side) {
        handle.addEventListener("pointerdown", event => {
          event.preventDefault();
          const startX = event.clientX;
          const startLeft = parseFloat(getComputedStyle(app).getPropertyValue("--left-width")) || 320;
          const startRight = parseFloat(getComputedStyle(app).getPropertyValue("--right-width")) || 520;
          handle.classList.add("dragging");
          document.body.classList.add("resizing");

          const onMove = moveEvent => {
            const delta = moveEvent.clientX - startX;
            if (side === "left") {
              app.style.setProperty("--left-width", `${clamp(startLeft + delta, 240, 560)}px`);
            } else {
              app.style.setProperty("--right-width", `${clamp(startRight - delta, 360, 760)}px`);
            }
            draw();
          };

          const onUp = () => {
            handle.classList.remove("dragging");
            document.body.classList.remove("resizing");
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
          };

          window.addEventListener("pointermove", onMove);
          window.addEventListener("pointerup", onUp, { once: true });
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function renderDetails() {
        const symbol = state.selected;
        if (!symbol) {
          details.className = "detail muted";
          details.textContent = "Select a rectangle.";
          return;
        }
        details.className = "detail";
        details.innerHTML = `
          <div class="detailCard">
            <strong class="detailName" title="${escapeHtml(symbol.demangled)}">${escapeHtml(symbol.demangled)}</strong>
            <code>${escapeHtml(symbol.name)}</code>
            <dl>
              <dt>Own frame</dt><dd>${formatBytes(symbol.own_frame.bytes)}</dd>
              <dt>Crate</dt><dd>${escapeHtml(symbolCrate(symbol) ?? "unknown")}</dd>
              <dt>Worst path</dt><dd>${formatBytes(symbol.worst_path.bytes)}</dd>
              <dt>Code size</dt><dd>${formatBytes(symbol.size_bytes)}</dd>
              <dt>Address</dt><dd>0x${Number(symbol.address).toString(16)}</dd>
              <dt>Status</dt><dd>${escapeHtml(symbol.worst_path.status)}</dd>
              <dt>Confidence</dt><dd>${escapeHtml(symbol.confidence)}</dd>
            </dl>
            <div class="pillRow">
              ${symbol.evidence.map(e => `<span class="pill">${escapeHtml(e.source)}:${escapeHtml(e.confidence)}</span>`).join("")}
              ${(symbol.unresolved_reasons.length ? symbol.unresolved_reasons : ["no unresolved reasons"]).map(item => `<span class="pill">${escapeHtml(item)}</span>`).join("")}
            </div>
          </div>
          ${renderSymbolContext(symbol)}`;
        bindCodePopouts(symbol);
      }

      function loadSymbolContext() {
        const symbol = state.selected;
        state.context = null;
        state.contextSymbolId = symbol?.id ?? null;
        state.contextLoading = Boolean(symbol);
        if (!symbol) return;

        fetch(`/api/symbol-context?id=${encodeURIComponent(symbol.id)}`)
          .then(response => response.ok ? response.json() : Promise.reject(new Error(`HTTP ${response.status}`)))
          .then(context => {
            if (state.contextSymbolId !== symbol.id) return;
            state.context = context;
            state.contextLoading = false;
            renderDetails();
          })
          .catch(error => {
            if (state.contextSymbolId !== symbol.id) return;
            state.context = { source: null, disassembly: null, messages: [`Context unavailable: ${error}`] };
            state.contextLoading = false;
            renderDetails();
          });
      }

      function renderSymbolContext(symbol) {
        if (state.contextLoading) {
          return `<div class="codePanel"><div class="contextMessage">Loading source and disassembly...</div></div>`;
        }
        const context = state.contextSymbolId === symbol.id ? state.context : null;
        if (!context) {
          return `<div class="codePanel"><div class="contextMessage">Select a symbol to load source and disassembly.</div></div>`;
        }
        const source = renderSourceBlock(context.source, false);
        const asm = renderDisassemblyBlock(context.disassembly, false);
        const messages = (context.messages ?? []).map(message => `<div class="contextMessage">${escapeHtml(message)}</div>`).join("");
        return `
          <div class="codePanel">
            <div class="codeHeader">
              <h2>Side View</h2>
              ${context.source ? `<button class="sourceLink" type="button" data-popout="file" title="Open full source file: ${escapeHtml(context.source.file)}">${escapeHtml(context.source.file)}:${context.source.line ?? ""}</button>` : `<span class="muted">No source link</span>`}
            </div>
            <div class="codeGrid">
              ${source}
              ${asm}
              ${messages}
            </div>
          </div>`;
      }

      function renderSourceBlock(source, modal, title = "Implementation") {
        if (!source) return "";
        return `
          <div class="codeBlock${modal ? " modalCodeBlock" : ""}" ${modal ? "" : 'data-popout="file" tabindex="0" title="Open full source file focused on this function"'}>
            <div class="codeTitle"><span>${escapeHtml(title)}</span><span>${escapeHtml(source.language)}</span></div>
            ${source.lines.map(line => `
              <div class="codeLine${line.highlight ? " highlight" : ""}">
                <span class="lineNo">${line.number}</span>
                <span>${highlightSource(line.text, source.language)}</span>
              </div>`).join("")}
          </div>`;
      }

      function renderDisassemblyBlock(disassembly, modal) {
        if (!disassembly) return "";
        return `
          <div class="codeBlock${modal ? " modalCodeBlock" : ""}" ${modal ? "" : 'data-popout="disassembly" tabindex="0" title="Open disassembly in a larger view"'}>
            <div class="codeTitle"><span>Disassembly</span><span>${escapeHtml(disassembly.architecture)} / ${escapeHtml(disassembly.syntax)}</span></div>
            ${disassembly.instructions.map(line => `
              <div class="codeLine asmLine">
                <span class="address">${escapeHtml(line.address)}</span>
                <span class="bytes">${escapeHtml(line.bytes)}</span>
                <span>${highlightAsm(line.text)}</span>
              </div>`).join("")}
          </div>`;
      }

      function bindCodePopouts(symbol) {
        details.querySelectorAll("[data-popout]").forEach(block => {
          const kind = block.getAttribute("data-popout");
          block.addEventListener("click", () => openCodeModal(kind, symbol));
          block.addEventListener("keydown", event => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openCodeModal(kind, symbol);
            }
          });
        });
      }

      function openCodeModal(kind, symbol) {
        const context = state.contextSymbolId === symbol.id ? state.context : null;
        if (!context) return;
        if (kind === "file") {
          openSourceFileModal(symbol, context);
          return;
        }
        const isSource = kind === "source";
        const title = isSource ? "Implementation" : "Disassembly";
        const sourceLabel = context.source ? `${context.source.file}:${context.source.line ?? ""}` : symbol.demangled;
        codeModalTitle.textContent = title;
        codeModalSubtitle.textContent = isSource ? sourceLabel : symbol.demangled;
        codeModalBody.innerHTML = isSource
          ? renderSourceBlock(context.source, true)
          : renderDisassemblyBlock(context.disassembly, true);
        if (!codeModalBody.innerHTML.trim()) {
          codeModalBody.innerHTML = `<div class="contextMessage">No ${escapeHtml(title.toLowerCase())} is available for this symbol.</div>`;
        }
        showCodeModal(kind, symbol.id);
      }

      function openSourceFileModal(symbol, context) {
        if (!context.source) return;
        const sourceLabel = `${context.source.file}:${context.source.line ?? ""}`;
        codeModalTitle.textContent = "Full file";
        codeModalSubtitle.textContent = sourceLabel;
        showCodeModal("file", symbol.id);

        const cached = state.fullSourceCache.get(symbol.id);
        if (cached) {
          renderSourceFileModal(cached);
          return;
        }

        codeModalBody.innerHTML = `<div class="contextMessage">Loading full source file...</div>`;
        fetch(`/api/source-file?id=${encodeURIComponent(symbol.id)}`)
          .then(response => response.ok ? response.json() : Promise.reject(new Error(`HTTP ${response.status}`)))
          .then(payload => {
            if (state.codeModalKind !== "file" || state.codeModalSymbolId !== symbol.id) return;
            state.fullSourceCache.set(symbol.id, payload);
            renderSourceFileModal(payload);
          })
          .catch(error => {
            if (state.codeModalKind !== "file" || state.codeModalSymbolId !== symbol.id) return;
            codeModalBody.innerHTML = `<div class="contextMessage">Full source file unavailable: ${escapeHtml(String(error))}</div>`;
          });
      }

      function renderSourceFileModal(payload) {
        const source = payload.source;
        const messages = (payload.messages ?? []).map(message => `<div class="contextMessage">${escapeHtml(message)}</div>`).join("");
        codeModalBody.innerHTML = source
          ? `${renderSourceBlock(source, true, "Full file")}${messages}`
          : messages || `<div class="contextMessage">Full source file unavailable.</div>`;
        scrollHighlightedLineIntoView();
      }

      function showCodeModal(kind, symbolId) {
        state.codeModalKind = kind;
        state.codeModalSymbolId = symbolId;
        codeModal.classList.remove("hidden");
        codeModal.setAttribute("aria-hidden", "false");
        codeModalFullscreen.textContent = codeModal.classList.contains("fullscreen") ? "Windowed" : "Full screen";
        codeModalClose.focus();
      }

      function scrollHighlightedLineIntoView() {
        const highlighted = codeModalBody.querySelector(".codeLine.highlight");
        if (highlighted) {
          highlighted.scrollIntoView({ block: "center" });
        }
      }

      function closeCodeModal() {
        codeModal.classList.add("hidden");
        codeModal.classList.remove("fullscreen");
        codeModal.setAttribute("aria-hidden", "true");
        codeModalBody.innerHTML = "";
        codeModalFullscreen.textContent = "Full screen";
        state.codeModalKind = null;
        state.codeModalSymbolId = null;
      }

      function draw() {
        const bounds = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(bounds.width * ratio));
        canvas.height = Math.max(1, Math.floor(bounds.height * ratio));

        drawBackground();
        const layoutResult = groupedTreemap(state.filtered, 10 * ratio, 10 * ratio, canvas.width - 20 * ratio, canvas.height - 20 * ratio);
        state.groupRects = layoutResult.groups;
        state.rects = layoutResult.symbols;
        for (const rect of state.rects) {
          const fill = groupColor(rect.symbol, state.report);
          ctx.fillStyle = rectGradient(rect, fill);
          roundRect(ctx, rect.x, rect.y, rect.w, rect.h, Math.min(5 * ratio, rect.w / 5, rect.h / 5));
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.74)";
          ctx.lineWidth = Math.max(1, ratio);
          ctx.stroke();

          if (rect.symbol === state.selected || rect.symbol === state.hovered) {
            ctx.strokeStyle = rect.symbol === state.selected ? "#101828" : "rgba(16,24,40,0.62)";
            ctx.lineWidth = rect.symbol === state.selected ? 3 * ratio : 2 * ratio;
            roundRect(ctx, rect.x + 2 * ratio, rect.y + 2 * ratio, rect.w - 4 * ratio, rect.h - 4 * ratio, Math.min(4 * ratio, rect.w / 6, rect.h / 6));
            ctx.stroke();
          }

          if (rect.w > 96 * ratio && rect.h > 32 * ratio) {
            const label = trimMiddle(rect.symbol.demangled, Math.floor(rect.w / (7 * ratio)));
            ctx.fillStyle = readableText(fill);
            ctx.font = `${12 * ratio}px system-ui`;
            ctx.fillText(label, rect.x + 8 * ratio, rect.y + 19 * ratio);
          }
        }
        drawGroupBoundaries(ratio);
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#fbfcfe");
        gradient.addColorStop(1, "#eef2f6");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(148, 163, 184, 0.18)";
        ctx.lineWidth = 1;
        const step = 32 * (window.devicePixelRatio || 1);
        for (let x = step; x < canvas.width; x += step) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }
        for (let y = step; y < canvas.height; y += step) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(canvas.width, y);
          ctx.stroke();
        }
      }

      function pickRect(event) {
        const rect = canvas.getBoundingClientRect();
        const ratio = window.devicePixelRatio || 1;
        const x = (event.clientX - rect.left) * ratio;
        const y = (event.clientY - rect.top) * ratio;
        return state.rects.find(item => x >= item.x && x <= item.x + item.w && y >= item.y && y <= item.y + item.h);
      }

      function metricValue(symbol) {
        switch (metric.value) {
          case "worst": return symbol.worst_path.bytes ?? 0;
          case "code": return symbol.size_bytes ?? 0;
          case "risk": return symbol.own_frame.bytes == null ? Math.max(1, symbol.size_bytes ?? 1) : 0;
          default: return symbol.own_frame.bytes ?? 0;
        }
      }

      function metricLabel(value) {
        return { own: "Own frame", worst: "Worst path", code: "Code size", risk: "Risk" }[value] ?? "Metric";
      }

      const STD_COLORS = {
        std: "#4667d8",
        core: "#6f55c9",
        alloc: "#d18a00",
        panic_unwind: "#c2410c",
        panic_abort: "#c2410c",
        compiler_builtins: "#64748b",
        unwind: "#64748b",
        test: "#0d9488",
      };
      const PRIMARY_MODULE_COLORS = ["#008f7a", "#159947", "#007fb8", "#c2417a", "#b45309", "#6d5bd0", "#0d9488", "#b91c1c"];
      const CRATE_COLORS = ["#2563eb", "#d97706", "#7c3aed", "#059669", "#dc2626", "#0284c7", "#be123c", "#65a30d", "#9333ea", "#0d9488", "#ca8a04", "#4f46e5"];

      function groupColor(symbol, report) {
        const crate = symbolCrate(symbol);
        if (!crate || isSyntheticCrate(crate)) return "#94a3b8";
        const primary = primaryCrateName(report);
        if (primary && crate === primary) {
          return PRIMARY_MODULE_COLORS[hashString(primaryModuleName(symbol, crate)) % PRIMARY_MODULE_COLORS.length];
        }
        if (STD_COLORS[crate]) return STD_COLORS[crate];
        return CRATE_COLORS[hashString(crate) % CRATE_COLORS.length];
      }

      function groupPriority(symbol, report) {
        const crate = symbolCrate(symbol);
        if (!crate || isSyntheticCrate(crate)) return 3;
        const primary = primaryCrateName(report);
        if (primary && crate === primary) return 0;
        if (isRuntimeCrate(crate)) return 1;
        return 2;
      }

      function treemapGroupName(symbol, report) {
        const crate = symbolCrate(symbol);
        if (!crate || isSyntheticCrate(crate)) return "unknown symbols";
        const primary = primaryCrateName(report);
        if (primary && crate === primary) return primaryModuleName(symbol, crate);
        return crate;
      }

      function primaryCrateName(report) {
        const crates = new Set(report.symbols.map(symbol => normalizeCrate(symbol.crate_name)).filter(Boolean));
        const artifactStem = report.artifact.file_name.replace(/\.[^.]+$/, "");
        const candidates = [report.build?.package, artifactStem, artifactStem.replace(/^lib/, "")];
        for (const candidate of candidates) {
          const normalized = normalizeCrate(candidate);
          if (normalized && crates.has(normalized)) return normalized;
        }
        return [...crates].find(crate => !isRuntimeCrate(crate) && !isSyntheticCrate(crate)) ?? null;
      }

      function primaryModuleName(symbol, crate) {
        const path = (symbol.module_path ?? []).map(part => normalizeCrate(part) ?? part).filter(Boolean);
        const withoutCrate = path[0] === crate ? path.slice(1) : path;
        return withoutCrate[0] ? `${crate}::${withoutCrate[0]}` : crate;
      }

      function symbolCrate(symbol) {
        return normalizeCrate(symbol.crate_name ?? symbol.demangled.split("::")[0] ?? null);
      }

      function normalizeCrate(value) {
        const normalized = String(value ?? "").trim().replace(/-/g, "_");
        return normalized || null;
      }

      function isRuntimeCrate(crate) {
        return Object.prototype.hasOwnProperty.call(STD_COLORS, crate) || crate === "__rustc";
      }

      function isSyntheticCrate(crate) {
        return /^sub_[0-9a-f]+$/i.test(crate);
      }

      function hashString(value) {
        let hash = 2166136261;
        for (let index = 0; index < value.length; index += 1) {
          hash ^= value.charCodeAt(index);
          hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
      }

      function readableText(hex) {
        const value = hex.replace("#", "");
        const r = parseInt(value.slice(0, 2), 16);
        const g = parseInt(value.slice(2, 4), 16);
        const b = parseInt(value.slice(4, 6), 16);
        return (r * 299 + g * 587 + b * 114) / 1000 > 150 ? "#101828" : "#ffffff";
      }

      function rectGradient(rect, base) {
        const gradient = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y + rect.h);
        gradient.addColorStop(0, mixColor(base, "#ffffff", 0.18));
        gradient.addColorStop(0.55, base);
        gradient.addColorStop(1, mixColor(base, "#000000", 0.16));
        return gradient;
      }

      function mixColor(left, right, amount) {
        const a = hexRgb(left);
        const b = hexRgb(right);
        return `rgb(${Math.round(a.r + (b.r - a.r) * amount)}, ${Math.round(a.g + (b.g - a.g) * amount)}, ${Math.round(a.b + (b.b - a.b) * amount)})`;
      }

      function hexRgb(hex) {
        const value = hex.replace("#", "");
        return {
          r: parseInt(value.slice(0, 2), 16),
          g: parseInt(value.slice(2, 4), 16),
          b: parseInt(value.slice(4, 6), 16),
        };
      }

      function symbolRank(symbol) {
        return /^sub_[0-9a-f]+$/i.test(symbol.demangled) || /^sub_[0-9a-f]+$/i.test(symbol.name) ? 1 : 0;
      }

      function groupedTreemap(symbols, x, y, w, h) {
        const groups = new Map();
        for (const symbol of symbols) {
          const value = metricValue(symbol);
          if (value <= 0) continue;
          const key = treemapGroupName(symbol, state.report);
          const group = groups.get(key) ?? { key, value: 0, priority: groupPriority(symbol, state.report), symbols: [] };
          group.value += value;
          group.symbols.push({ symbol, value });
          groups.set(key, group);
        }

        const orderedGroups = [...groups.values()];
        applyPrimaryGroupFloor(orderedGroups);
        const groupRects = squarify(orderedGroups, x, y, w, h, 260);
        const symbolRects = [];
        for (const groupRect of groupRects) {
          const pad = Math.min(7, Math.max(2, Math.min(groupRect.w, groupRect.h) * 0.015));
          const innerX = groupRect.x + pad;
          const innerY = groupRect.y + pad;
          const innerW = Math.max(0, groupRect.w - pad * 2);
          const innerH = Math.max(0, groupRect.h - pad * 2);
          symbolRects.push(...squarify(groupRect.item.symbols, innerX, innerY, innerW, innerH, 2600).map(rect => ({
            x: rect.x,
            y: rect.y,
            w: rect.w,
            h: rect.h,
            symbol: rect.item.symbol,
          })));
        }

        return {
          groups: groupRects.map(rect => ({ x: rect.x, y: rect.y, w: rect.w, h: rect.h, key: rect.item.key })),
          symbols: symbolRects,
        };
      }

      function applyPrimaryGroupFloor(groups) {
        const total = groups.reduce((sum, group) => sum + group.value, 0);
        if (!total) return;
        const primaryGroups = groups.filter(group => group.priority === 0);
        if (!primaryGroups.length) return;
        const floor = total * (primaryGroups.length > 6 ? 0.025 : 0.08);
        for (const group of primaryGroups) {
          group.value = Math.max(group.value, floor);
          const symbolTotal = group.symbols.reduce((sum, item) => sum + item.value, 0);
          if (symbolTotal > 0 && symbolTotal < floor) {
            const scale = floor / symbolTotal;
            group.symbols = group.symbols.map(item => ({ ...item, value: item.value * scale }));
          }
        }
      }

      function drawGroupBoundaries(ratio) {
        for (const rect of state.groupRects) {
          if (rect.w <= 0 || rect.h <= 0) continue;
          ctx.strokeStyle = "rgba(16, 24, 40, 0.22)";
          ctx.lineWidth = Math.max(1, ratio);
          roundRect(ctx, rect.x, rect.y, rect.w, rect.h, Math.min(8 * ratio, rect.w / 6, rect.h / 6));
          ctx.stroke();

          if (rect.w > 64 * ratio && rect.h > 42 * ratio) {
            const label = trimMiddle(rect.key, Math.floor(rect.w / (7 * ratio)));
            ctx.font = `600 ${12 * ratio}px system-ui`;
            const labelWidth = Math.min(ctx.measureText(label).width + 16 * ratio, rect.w - 14 * ratio);
            const labelX = rect.x + rect.w - labelWidth - 7 * ratio;
            ctx.fillStyle = "rgba(255, 255, 255, 0.82)";
            roundRect(ctx, labelX, rect.y + 7 * ratio, labelWidth, 24 * ratio, 6 * ratio);
            ctx.fill();
            ctx.fillStyle = "rgba(16, 24, 40, 0.78)";
            ctx.fillText(label, labelX + 8 * ratio, rect.y + 23 * ratio);
          }
        }
      }

      function squarify(items, x, y, w, h, limit) {
        const total = items.reduce((sum, item) => sum + item.value, 0);
        if (!total || w <= 0 || h <= 0) return [];
        const sorted = items.sort((a, b) => (a.priority ?? 10) - (b.priority ?? 10) || b.value - a.value).slice(0, limit);
        const rects = [];
        layout(sorted.map(item => ({ ...item, area: item.value / total * w * h })), x, y, w, h, rects);
        return rects;
      }

      function layout(items, x, y, w, h, out) {
        if (!items.length || w <= 0 || h <= 0) return;
        if (items.length === 1) {
          out.push({ x, y, w, h, item: items[0] });
          return;
        }
        const horizontal = w >= h;
        const half = items.reduce((sum, item) => sum + item.area, 0) / 2;
        let acc = 0, split = 0;
        while (split < items.length - 1 && acc + items[split].area <= half) acc += items[split++].area;
        split = Math.max(1, split);
        const first = items.slice(0, split);
        const second = items.slice(split);
        const firstArea = first.reduce((sum, item) => sum + item.area, 0);
        const totalArea = firstArea + second.reduce((sum, item) => sum + item.area, 0);
        const ratio = totalArea ? firstArea / totalArea : 0.5;
        if (horizontal) {
          const ww = w * ratio;
          layout(first, x, y, ww, h, out);
          layout(second, x + ww, y, w - ww, h, out);
        } else {
          const hh = h * ratio;
          layout(first, x, y, w, hh, out);
          layout(second, x, y + hh, w, h - hh, out);
        }
      }

      function roundRect(context, x, y, w, h, r) {
        const radius = Math.max(0, Math.min(r, w / 2, h / 2));
        context.beginPath();
        context.moveTo(x + radius, y);
        context.lineTo(x + w - radius, y);
        context.quadraticCurveTo(x + w, y, x + w, y + radius);
        context.lineTo(x + w, y + h - radius);
        context.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
        context.lineTo(x + radius, y + h);
        context.quadraticCurveTo(x, y + h, x, y + h - radius);
        context.lineTo(x, y + radius);
        context.quadraticCurveTo(x, y, x + radius, y);
        context.closePath();
      }

      function formatBytes(value) {
        return value == null ? "unknown" : `${formatNumber(value)} B`;
      }

      function formatNumber(value) {
        return Number(value).toLocaleString();
      }

      function trimMiddle(text, max) {
        if (text.length <= max) return text;
        if (max < 8) return text.slice(0, max);
        return `${text.slice(0, max - 4)}...`;
      }

      function highlightSource(text, language) {
        let escaped = escapeHtml(text);
        if (language !== "rust") return escaped;
        escaped = escaped.replace(/(\/\/.*)$/g, '<span class="tok-comment">$1</span>');
        escaped = escaped.replace(/\b(fn|pub|let|mut|if|else|match|while|for|loop|return|unsafe|extern|impl|trait|struct|enum|use|mod|crate|where|async|await|move|const|static|ref|Self|self)\b/g, '<span class="tok-key">$1</span>');
        escaped = escaped.replace(/\b([A-Z][A-Za-z0-9_]*|u8|u16|u32|u64|usize|i8|i16|i32|i64|isize|bool|str|String|Option|Result|Vec)\b/g, '<span class="tok-type">$1</span>');
        escaped = escaped.replace(/([A-Za-z_][A-Za-z0-9_]*!)/g, '<span class="tok-macro">$1</span>');
        return escaped;
      }

      function highlightAsm(text) {
        let escaped = escapeHtml(text);
        escaped = escaped.replace(/^([a-z][a-z0-9.]*)/i, '<span class="asm-op">$1</span>');
        escaped = escaped.replace(/\b(r(?:ax|bx|cx|dx|si|di|sp|bp|8|9|1[0-5])[dwb]?|e(?:ax|bx|cx|dx|si|di|sp|bp)|[abcd][lh]|xmm\d+|ymm\d+|rsp|rbp|rip)\b/gi, '<span class="asm-reg">$1</span>');
        escaped = escaped.replace(/\b(0x[0-9a-f]+|\d+)\b/gi, '<span class="asm-num">$1</span>');
        return escaped;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
      }
    </script>
  </body>
</html>
